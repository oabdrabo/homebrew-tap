name: Update DisplayDeck cask

on:
  schedule:
    - cron: "0 */6 * * *"     # every 6h: pick up new releases
  workflow_dispatch:           # run it manually anytime
  repository_dispatch:
    types: [displaydeck-release]   # optional instant trigger from the app repo

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump cask to latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="oabdrabo/DisplayDeck"
          cask="Casks/displaydeck.rb"

          ver=$(gh release view --repo "$repo" --json tagName -q '.tagName' | sed 's/^v//')
          cur=$(grep -m1 -E '^\s*version ' "$cask" | sed -E 's/.*"([^"]+)".*/\1/')
          echo "latest=$ver  cask=$cur"
          if [ "$ver" = "$cur" ]; then echo "already up to date"; exit 0; fi

          gh release download "v$ver" --repo "$repo" \
             --pattern 'DisplayDeck.app.zip' --output app.zip --clobber
          sha=$(sha256sum app.zip | cut -d' ' -f1)
          rm -f app.zip
          echo "new version=$ver sha=$sha"

          sed -i -E "s/version \"[^\"]+\"/version \"$ver\"/" "$cask"
          sed -i -E "s/sha256 \"[^\"]+\"/sha256 \"$sha\"/" "$cask"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$cask"
          git commit -m "displaydeck $ver" && git push
